services:
  # MERN Application Container (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: mern_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/employee_management
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mern-network

  # MongoDB Container
  mongo:
    image: mongo:latest
    container_name: mern_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=employee_management
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mern-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local